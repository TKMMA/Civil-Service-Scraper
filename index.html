<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Service Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #F9FAFB; font-family: 'Inter', sans-serif; color: #000; }
        h2 { color: #005995; font-weight: 700; border-left: 6px solid #40E0D0; padding-left: 15px; margin-top: 40px; }
        .table thead { background-color: #005995; color: white; }
        
        /* Filter Button Styling */
        .filter-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .filter-btn {
            font-size: 0.75rem; font-weight: bold; border-radius: 20px; padding: 4px 14px;
            border: 2px solid #0084DF; background: #fff; color: #005995; transition: 0.2s;
            cursor: pointer; display: flex; align-items: center; gap: 6px;
        }
        .filter-btn.active { background: #0084DF; color: #fff; }
        .filter-btn.inactive { opacity: 0.3; background: #e9ecef; color: #6c757d; border-color: #dee2e6; }
        
        .salary-toggle { background-color: #40E0D0; color: #000; font-size: 0.7rem; font-weight: bold; border: 1px solid #005995; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-apply { background-color: #0084DF; color: #fff; font-weight: bold; border: none; padding: 5px 15px; }
        .btn-apply:hover { background-color: #005995; color: #fff; }

        /* Row Selection Styling */
        tr.shown { background-color: #d4f7f3 !important; border-left: 6px solid #40E0D0; }
        .duties-box { padding: 25px; background: #eefaff; border-bottom: 4px solid #40E0D0; color: #000; box-shadow: inset 0 4px 10px rgba(0,0,0,0.08); }
        .duties-header { color: #005995; font-weight: bold; text-transform: uppercase; font-size: 0.8rem; margin-bottom: 10px; border-bottom: 2px solid #40E0D0; display: inline-block; }
        .cursor-pointer tbody tr { cursor: pointer; transition: background 0.1s; }
        
        /* Search Bar Customization */
        .dataTables_filter input { border: 2px solid #0084DF; border-radius: 10px; padding: 4px 10px; font-family: 'Inter'; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold" style="color: #005995;">Civil Service Listings</h1>
        <div id="status" class="small text-muted">Initializing Bot Scan...</div>
    </div>

    <h2>DLNR Civil Service Listings</h2>
    <div id="civilFilters" class="filter-container"></div>
    <div class="card p-3 mb-5 border-0 shadow-sm">
        <table id="civilTable" class="table table-hover w-100 cursor-pointer">
            <thead>
                <tr>
                    <th>Title</th><th>ID</th><th>Division</th><th>Location</th>
                    <th>Salary <button class="salary-toggle toggle-btn">Show /mo</button></th>
                    <th>Closing</th><th>Action</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
let viewMonthly = false;

const salRender = d => {
    if (!d) return '<span class="text-muted small">See Listing</span>';
    let val = viewMonthly ? d / 12 : d;
    return `<strong>$${val.toLocaleString(undefined, {maximumFractionDigits: 0})}</strong>/${viewMonthly ? 'mo' : 'yr'}`;
};

function formatExpansion(d) {
    return `<div class="duties-box"><div class="duties-header">Position Summary & Duties</div><div class="mt-2" style="line-height: 1.6;">${d.duties}</div></div>`;
}

fetch('jobs.json').then(r => r.json()).then(data => {
    document.getElementById('status').innerText = `Last Updated: ${new Date(data.generated_at_utc).toLocaleString()}`;

    // Setup Filters
    const divisions = [...new Set(data.civil_service.map(j => j.division))].sort();
    if (!divisions.includes("Aquatic Resources")) divisions.unshift("Aquatic Resources");

    divisions.forEach(div => {
        $('#civilFilters').append(`<button class="filter-btn inactive" data-val="${div}">${div}</button>`);
    });

    const cTable = $('#civilTable').DataTable({
        data: data.civil_service,
        pageLength: 10,
        columns: [
            { data: 'title', className: 'fw-bold' },
            { data: 'job_number' },
            { data: 'division' },
            { data: 'location' },
            { data: 'yearly_salary', render: salRender },
            { data: 'closing' },
            { data: 'link', render: l => `<a href="${l}" target="_blank" class="btn btn-sm btn-apply">Apply</a>` }
        ]
    });

    // Filter Handler with Search Bar Sync
    $(document).on('click', '.filter-btn', function() {
        $(this).toggleClass('active inactive');
        
        const activeFilters = [];
        $('.filter-btn.active').each(function() {
            activeFilters.push($(this).data('val'));
        });

        // Update Search Bar text
        const searchString = activeFilters.join(' | ');
        $('.dataTables_filter input').val(searchString);

        // Apply Regex Search to Division Column (index 2)
        const regex = activeFilters.map(f => `^${f.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')}$`).join('|');
        cTable.column(2).search(activeFilters.length ? regex : '', true, false).draw();
    });

    // Accordion Logic
    $('.table tbody').on('click', 'td:not(:last-child)', function () {
        const tr = $(this).closest('tr');
        const row = cTable.row(tr);
        if (row.child.isShown()) {
            row.child.hide();
            tr.removeClass('shown');
        } else {
            cTable.rows().every(function() {
                if(this.child.isShown()){
                    this.child.hide();
                    $(this.node()).removeClass('shown');
                }
            });
            row.child(formatExpansion(row.data())).show();
            tr.addClass('shown');
        }
    });

    $('.toggle-btn').on('click', function(e) {
        e.stopPropagation();
        viewMonthly = !viewMonthly;
        $('.toggle-btn').text(viewMonthly ? 'Show /yr' : 'Show /mo');
        cTable.rows().invalidate().draw();
    });
});
</script>
</body>
</html>
