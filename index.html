<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Civil Service Listings</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.4/css/dataTables.bootstrap5.min.css">
    <style>
        body { background-color: #F9FAFB; font-family: 'Inter', sans-serif; color: #000; }
        h2 { color: #005995; font-weight: 700; border-left: 6px solid #40E0D0; padding-left: 15px; margin-top: 40px; }
        .table thead { background-color: #005995; color: white; }
        
        .filter-container { margin: 15px 0; display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
        .filter-btn {
            font-size: 0.75rem; font-weight: bold; border-radius: 20px; padding: 6px 16px;
            border: 2px solid #0084DF; background: #fff; color: #005995; transition: 0.2s;
            cursor: pointer; display: flex; align-items: center; gap: 8px;
        }
        .filter-btn.active { background: #0084DF; color: #fff; border-color: #0084DF; }
        .filter-btn.inactive { opacity: 0.5; background: #fff; color: #6c757d; border-color: #dee2e6; }
        .filter-btn .close-x { display: none; font-weight: bold; margin-left: 4px; }
        .filter-btn.active .close-x { display: inline; }
        
        .all-btn { background-color: #005995; color: white; border: none; border-radius: 20px; padding: 6px 20px; font-weight: bold; font-size: 0.75rem; cursor: pointer; }
        .salary-toggle { background-color: #40E0D0; color: #000; font-size: 0.7rem; font-weight: bold; border: 1px solid #005995; padding: 2px 8px; border-radius: 4px; cursor: pointer; }
        .btn-apply { background-color: #0084DF; color: #fff; font-weight: bold; border: none; padding: 5px 15px; border-radius: 6px; }
        .btn-interest { background-color: #40E0D0; color: #003b63; font-weight: 700; border: 1px solid #0084DF; padding: 5px 12px; border-radius: 6px; }
        .action-buttons { display: flex; flex-wrap: wrap; gap: 6px; }
        
        .dataTables_filter input { border: 2px solid #0084DF !important; border-radius: 8px !important; padding: 6px 12px !important; width: 350px !important; }
        .duties-box { padding: 20px; background: #f0f9ff; border-left: 5px solid #40E0D0; font-size: 0.85rem; }
    </style>
</head>
<body>
<div class="container py-5">
    <div class="text-center mb-5">
        <h1 class="display-5 fw-bold" style="color: #005995;">Civil Service Listings</h1>
        <div id="status" class="small text-muted">Loading job data...</div>
    </div>

    <h2>Departmental Divisions</h2>
    <div id="civilFilters" class="filter-container">
        <button class="all-btn" id="clearFilters">All</button>
        <button class="filter-btn active" data-val="Division of Aquatic Resources">Division of Aquatic Resources <span class="close-x">×</span></button>
    </div>

    <div class="card p-3 mb-5 border-0 shadow-sm">
        <table id="civilTable" class="table table-hover w-100">
            <thead>
                <tr>
                    <th>Title</th><th>ID</th><th>Division</th><th>Location</th>
                    <th>Salary <button class="salary-toggle toggle-btn">Show /mo</button></th>
                    <th>Closing</th><th>Action</th>
                </tr>
            </thead>
        </table>
    </div>
</div>

<div class="modal fade" id="interestModal" tabindex="-1" aria-labelledby="interestModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header">
                <h5 class="modal-title" id="interestModalLabel">Position Interest Form</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <div class="alert alert-info small" id="interestRole"></div>
                <form id="interestForm">
                    <input type="hidden" id="jobTitle">
                    <input type="hidden" id="jobId">
                    <div class="mb-3">
                        <label for="applicantName" class="form-label fw-semibold">Name</label>
                        <input type="text" class="form-control" id="applicantName" required>
                    </div>
                    <div class="mb-3">
                        <label for="applicantEmail" class="form-label fw-semibold">Email</label>
                        <input type="email" class="form-control" id="applicantEmail" required>
                    </div>
                    <div class="mb-3">
                        <label for="coverLetter" class="form-label fw-semibold">Cover Letter</label>
                        <textarea class="form-control" id="coverLetter" rows="6" placeholder="Paste your cover letter here" required></textarea>
                    </div>
                    <div class="d-flex justify-content-end gap-2">
                        <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary">Submit Interest</button>
                    </div>
                </form>
                <div class="alert alert-success mt-3 d-none" id="interestSuccess"></div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/jquery.dataTables.min.js"></script>
<script src="https://cdn.datatables.net/1.13.4/js/dataTables.bootstrap5.min.js"></script>

<script>
let viewMonthly = false;
let interestModal;

const salRender = d => {
    if (!d) return '<span class="text-muted small">See Listing</span>';
    let val = viewMonthly ? d / 12 : d;
    return `<strong>$${val.toLocaleString(undefined, {maximumFractionDigits: 0})}</strong>/${viewMonthly ? 'mo' : 'yr'}`;
};

function formatExpansion(d) {
    return `<div class="duties-box"><strong>Position Summary:</strong><div class="mt-2">${d.duties}</div></div>`;
}

fetch('jobs.json').then(r => r.json()).then(data => {
    document.getElementById('status').innerText = `Last Updated: ${new Date(data.generated_at_utc).toLocaleString()}`;

    // Add other divisions dynamically (excluding the one we hardcoded)
    const divisions = [...new Set(data.civil_service.map(j => j.division))].sort();
    divisions.forEach(div => {
        if(div !== "Division of Aquatic Resources") {
            $('#civilFilters').append(`<button class="filter-btn inactive" data-val="${div}">${div} <span class="close-x">×</span></button>`);
        }
    });

    const cTable = $('#civilTable').DataTable({
        data: data.civil_service,
        pageLength: 25,
        dom: '<"d-flex justify-content-between align-items-center mb-3"lf>rtip',
        columns: [
            { data: 'title', className: 'fw-bold' },
            { data: 'job_number' },
            { data: 'division' },
            { data: 'location' },
            { data: 'yearly_salary', render: salRender },
            { data: 'closing' },
            {
                data: null,
                orderable: false,
                render: row => `
                    <div class="action-buttons">
                        <a href="${row.link}" target="_blank" class="btn btn-sm btn-apply">Apply</a>
                        <button class="btn btn-sm btn-interest btn-open-interest" data-title="${$('<div>').text(row.title).html()}" data-id="${$('<div>').text(row.job_number).html()}">I'm Interested</button>
                    </div>
                `
            }
        ]
    });

    interestModal = new bootstrap.Modal(document.getElementById('interestModal'));

    // --- APPLY DEFAULT FILTER ON LOAD ---
    const defaultVal = "Division of Aquatic Resources";
    cTable.search(defaultVal).draw();
    $('.dataTables_filter input').val(defaultVal);

    // Filter Logic
    $(document).on('click', '.filter-btn', function() {
        $(this).toggleClass('active inactive');
        
        const activeFilters = [];
        $('.filter-btn.active').each(function() {
            activeFilters.push($(this).data('val'));
        });

        // Use "|" for OR logic in search
        const searchString = activeFilters.join(' | ');
        cTable.search(searchString, true, false).draw();
        $('.dataTables_filter input').val(searchString);
    });

    // "All" Button clears buttons and search bar
    $('#clearFilters').on('click', function() {
        $('.filter-btn').removeClass('active').addClass('inactive');
        cTable.search('').draw();
        $('.dataTables_filter input').val('');
    });

    // Row expansion
    $('#civilTable tbody').on('click', 'tr', function (e) {
        if ($(e.target).closest('a, button').length) return;
        const tr = $(this).closest('tr');
        const row = cTable.row(tr);
        if (row.child.isShown()) {
            row.child.hide();
        } else {
            row.child(formatExpansion(row.data())).show();
        }
    });

    $('.toggle-btn').on('click', function(e) {
        e.stopPropagation();
        viewMonthly = !viewMonthly;
        $(this).text(viewMonthly ? 'Show /yr' : 'Show /mo');
        cTable.rows().invalidate().draw();
    });

    $(document).on('click', '.btn-open-interest', function(e) {
        e.stopPropagation();
        const title = $(this).data('title');
        const jobId = $(this).data('id');
        $('#jobTitle').val(title);
        $('#jobId').val(jobId);
        $('#interestRole').text(`You are submitting interest for: ${title} (ID: ${jobId})`);
        $('#interestSuccess').addClass('d-none').text('');
        $('#interestForm').removeClass('d-none')[0].reset();
        $('#jobTitle').val(title);
        $('#jobId').val(jobId);
        interestModal.show();
    });

    $('#interestForm').on('submit', function(e) {
        e.preventDefault();
        const jobTitle = $('#jobTitle').val();
        const jobId = $('#jobId').val();
        const name = $('#applicantName').val();
        const email = $('#applicantEmail').val();

        $('#interestSuccess')
            .removeClass('d-none')
            .text(`Thanks, ${name}! Your interest for ${jobTitle} (ID: ${jobId}) has been recorded. We'll contact you at ${email}.`);
        this.reset();
    });
});
</script>
</body>
</html>
