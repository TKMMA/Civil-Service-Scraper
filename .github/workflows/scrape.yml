name: Daily Scraper

on:
  schedule:
    - cron: '0 18 * * *' # Runs daily at 8:00 AM HST (18:00 UTC)
  workflow_dispatch:      # THIS ADDS THE "RUN WORKFLOW" BUTTON BACK

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write     # Needed to save jobs.json
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run Scraper
        run: python scraper.py

      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add jobs.json
          git commit -m "Automated data refresh" || echo "No changes to commit"
          git push
